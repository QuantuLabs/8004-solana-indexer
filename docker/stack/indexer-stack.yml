name: 8004-indexer-stack

services:
  indexer:
    image: ${INDEXER_IMAGE:-ghcr.io/quantulabs/8004-indexer:latest}
    container_name: 8004-indexer
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_MODE: ${DB_MODE:?set DB_MODE}
      DATABASE_URL: ${DATABASE_URL:-file:./data/indexer.db}
      API_MODE: ${API_MODE:?set API_MODE}
      API_PORT: ${API_PORT:-3001}
      ENABLE_GRAPHQL: ${ENABLE_GRAPHQL:-true}
      SOLANA_NETWORK: ${SOLANA_NETWORK:-devnet}
      RPC_URL: ${RPC_URL:-}
      WS_URL: ${WS_URL:-}
      MAX_SUPPORTED_TRANSACTION_VERSION: ${MAX_SUPPORTED_TRANSACTION_VERSION:-0}
      PROGRAM_ID: ${PROGRAM_ID:-}
      ATOM_ENGINE_PROGRAM_ID: ${ATOM_ENGINE_PROGRAM_ID:-}
      SUPABASE_DSN: ${SUPABASE_DSN:-}
      SUPABASE_SSL_VERIFY: ${SUPABASE_SSL_VERIFY:-true}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
      POSTGREST_URL: ${POSTGREST_URL:-}
      POSTGREST_TOKEN: ${POSTGREST_TOKEN:-}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      GRAPHQL_STATS_CACHE_TTL_MS: ${GRAPHQL_STATS_CACHE_TTL_MS:-60000}
      GRAPHQL_RATE_LIMIT_MAX_REQUESTS: ${GRAPHQL_RATE_LIMIT_MAX_REQUESTS:-30}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      INDEXER_MODE: ${INDEXER_MODE:-polling}
      POLLING_INTERVAL: ${POLLING_INTERVAL:-15000}
      BATCH_SIZE: ${BATCH_SIZE:-100}
      POLLER_BATCH_RPC_ENABLED: ${POLLER_BATCH_RPC_ENABLED:-true}
      POLLER_RPC_CHUNK_SIZE: ${POLLER_RPC_CHUNK_SIZE:-100}
      POLLER_RPC_CHUNK_CONCURRENCY: ${POLLER_RPC_CHUNK_CONCURRENCY:-3}
      INDEXER_START_SIGNATURE: ${INDEXER_START_SIGNATURE:-}
      INDEXER_START_SLOT: ${INDEXER_START_SLOT:-}
      INDEXER_STOP_SLOT: ${INDEXER_STOP_SLOT:-}
      WS_RECONNECT_INTERVAL: ${WS_RECONNECT_INTERVAL:-3000}
      WS_MAX_RETRIES: ${WS_MAX_RETRIES:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_ENDPOINT_ENABLED: ${METRICS_ENDPOINT_ENABLED:-false}
      VERIFY_INTERVAL_MS: ${VERIFY_INTERVAL_MS:-60000}
      VERIFY_BATCH_SIZE: ${VERIFY_BATCH_SIZE:-100}
      VERIFY_SAFETY_MARGIN_SLOTS: ${VERIFY_SAFETY_MARGIN_SLOTS:-32}
      VERIFY_MAX_RETRIES: ${VERIFY_MAX_RETRIES:-3}
      VERIFY_RECOVERY_CYCLES: ${VERIFY_RECOVERY_CYCLES:-10}
      VERIFY_RECOVERY_BATCH_SIZE: ${VERIFY_RECOVERY_BATCH_SIZE:-50}
      INDEX_METADATA: ${INDEX_METADATA:-normal}
      INDEX_COLLECTION_METADATA: ${INDEX_COLLECTION_METADATA:-true}
      INDEX_VALIDATIONS: ${INDEX_VALIDATIONS:-false}
      METADATA_MAX_BYTES: ${METADATA_MAX_BYTES:-262144}
      METADATA_MAX_VALUE_BYTES: ${METADATA_MAX_VALUE_BYTES:-10000}
      IPFS_GATEWAY_BASE: ${IPFS_GATEWAY_BASE:-https://ipfs.io}
      URI_DIGEST_TRUSTED_HOSTS: ${URI_DIGEST_TRUSTED_HOSTS:-}
      ALLOW_INSECURE_URI: ${ALLOW_INSECURE_URI:-false}
      METADATA_RECOVERY_RETRY_MS: ${METADATA_RECOVERY_RETRY_MS:-900000}
      METADATA_RECOVERY_MAX_COOLDOWN_ENTRIES: ${METADATA_RECOVERY_MAX_COOLDOWN_ENTRIES:-10000}
      URI_DIGEST_DNS_NEGATIVE_TTL_MS: ${URI_DIGEST_DNS_NEGATIVE_TTL_MS:-600000}
      URI_DIGEST_DNS_NEGATIVE_CACHE_MAX_ENTRIES: ${URI_DIGEST_DNS_NEGATIVE_CACHE_MAX_ENTRIES:-10000}
      GRAPHQL_MAX_COMPLEXITY: ${GRAPHQL_MAX_COMPLEXITY:-3000}
      GRAPHQL_MAX_FIRST_CAP: ${GRAPHQL_MAX_FIRST_CAP:-400}
    volumes:
      - indexer_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:${API_PORT:-3001}/ready').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

volumes:
  indexer_data:
